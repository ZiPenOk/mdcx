name: CI/CD Pipeline

on:
  push:
    branches:
      - master
      - develop
  pull_request:
    branches:
      - master
      - develop
    types: [review_requested, ready_for_review]

jobs:
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.2.0

      - name: Run ruff format
        run: uvx ruff@0.15.12 format --check

      - name: Run ruff check
        run: uvx ruff@0.15.12 check --output-format=github
